services:
  mysql:
    image: mysql:8.4
    container_name: tashafy-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-tashafy}
      MYSQL_USER: ${MYSQL_USER:-tashafy}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-tashafy}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 5s
      timeout: 5s
      retries: 30

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: tashafy-api
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      APP_NAME: Tashafy
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      APP_KEY: ${APP_KEY:-base64:3MSfLQzKicfNZZN+55x5f38YsN3QfOUWfM8fZOe2gSY=}
      LOG_CHANNEL: stack
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${MYSQL_DATABASE:-tashafy}
      DB_USERNAME: ${MYSQL_USER:-tashafy}
      DB_PASSWORD: ${MYSQL_PASSWORD:-tashafy}
      SESSION_DRIVER: database
      CACHE_STORE: database
      QUEUE_CONNECTION: database
    ports:
      - "8000:8000"

  admin:
    build:
      context: ./apps/admin
      dockerfile: Dockerfile
    container_name: tashafy-admin
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "5173:5173"

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
    container_name: tashafy-frontend
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
      API_BASE_URL_INTERNAL: http://api:8000
      PORT: 3000
    ports:
      - "3000:3000"

volumes:
  mysql_data:
